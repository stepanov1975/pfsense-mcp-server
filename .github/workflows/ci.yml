name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Tests, lint, security, and secrets scans
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package and verification tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest -q

      - name: Run pylint
        run: PYTHONPATH=src python -m pylint src tests

      - name: Run Bandit static security scan
        run: python -m bandit --configfile pyproject.toml --recursive src

      - name: Run dependency vulnerability audit
        run: python -m pip_audit . --strict

      - name: Verify secrets baseline
        run: python -m detect_secrets scan --baseline .secrets.baseline --force-use-all-plugins
